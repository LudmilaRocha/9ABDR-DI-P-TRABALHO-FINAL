version: 2

models:
  - name: fact_reaction_events
    description: Um registro por gol sofrido; flags de reacao e resultado final.
    columns:
      - name: match_id
        tests:
          - not_null
      - name: competition_name
        tests:
          - not_null
      - name: conceding_team
        tests:
          - not_null
      - name: goal_minute
        tests:
          - not_null
      - name: goals_scored_after_conceding
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 20
              inclusive: true
      - name: final_result
        tests:
          - not_null
          - accepted_values:
              values: ['WIN', 'DRAW', 'LOSS', 'UNKNOWN']

  - name: dim_competition_summary
    columns:
      - name: competition_name
        tests:
          - not_null
      - name: pct_reacted
        tests:
          - not_null
