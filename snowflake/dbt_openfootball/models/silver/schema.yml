version: 2

models:
  - name: matches
    columns:
      - name: match_id
        tests:
          - not_null
          - unique
      - name: match_date
        tests:
          - not_null
      - name: home_team
        tests:
          - not_null
      - name: away_team
        tests:
          - not_null
      - name: home_score_ft
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 50
              inclusive: true
      - name: away_score_ft
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 50
              inclusive: true
      - name: competition_name
        tests:
          - not_null

  - name: goal_events
    columns:
      - name: match_id
        tests:
          - not_null
          - relationships:
              to: ref('matches')
              field: match_id
      - name: scorer
        tests:
          - not_null
      - name: minute
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 130
              inclusive: true
      - name: team
        tests:
          - not_null
      - name: credited_team
        tests:
          - not_null
      - name: conceding_team
        tests:
          - not_null
